services:
  api:
    build: .
    container_name: ecommerce_api
    ports:
      - "8000:8000" # Map port 8000 of the container to port 8000 on the host
    volumes:
      - ./src:/app/src # Mount the src directory to /app/src in the container
      - ./tests:/app/tests # Mount the tests directory to /app/tests in the container
      - ./alembic:/app/alembic # Mount the alembic directory to /app/alembic in the container
      - ./scripts:/app/scripts # Mount the scripts directory to /app/scripts in the container
      - ./alembic.ini:/app/alembic.ini
    environment:
      - DATABASE_URL=postgresql+asyncpg://${DB_USER}:${DB_PASSWORD}@db:5432/${DB_NAME}
      - REDIS_URL=${REDIS_URL}
      - REDIS_HOST=${REDIS_HOST}
      - REDIS_PORT=${REDIS_PORT}
      - REDIS_DB=${REDIS_DB}
      - SECRET_KEY=${SECRET_KEY}
      - ALGORITHM=${ALGORITHM}
      - ACCESS_TOKEN_EXPIRE_MINUTES=${ACCESS_TOKEN_EXPIRE_MINUTES}
    env_file:
      - .env
    depends_on:
      - db
      - redis
    restart: always

  # PostgreSQL
  db:
    image: postgres:15-alpine
    container_name: ecommerce_db
    ports:
      - "${DB_PORT}:5432" # Map port 5432 of the container to port 5432 on the host
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    env_file:
      - .env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always

  # Celery Worker — 處理非同步任務（Email 寄送等）
  celery-worker:
    build: .
    container_name: ecommerce_celery_worker
    command: celery -A infrastructure.celery_app worker -l info -c 2
    working_dir: /app/src
    volumes:
      - ./src:/app/src
    env_file:
      - .env
    depends_on:
      - redis
      - db
    restart: always

  # Celery Beat — 定期排程任務（帳號清理等）
  celery-beat:
    build: .
    container_name: ecommerce_celery_beat
    command: celery -A infrastructure.celery_app beat -l info
    working_dir: /app/src
    volumes:
      - ./src:/app/src
    env_file:
      - .env
    depends_on:
      - redis
      - db
    restart: always

  # Flower 監控
  celery-flower:
    build: .
    command: celery -A infrastructure.celery_app flower --port=5555
    ports:
      - "5555:5555"
    env_file:
      - .env
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
    depends_on:
      - redis
      - celery-worker

  # Redis
  redis:
    image: redis:7-alpine
    container_name: ecommerce_redis
    ports:
      - "6379:6379" # Map port 6379 of the container to port 6379 on the host
    restart: always

  # Frontend (Vue 3 / Vite dev server)
  frontend:
    image: node:20-alpine
    container_name: ecommerce_frontend
    working_dir: /app
    command: sh -c "npm install && npm run dev"
    ports:
      - "5173:5173"
    volumes:
      - ../frontend:/app
      - /app/node_modules
    environment:
      - VITE_API_BASE_URL=http://localhost:8000
    restart: always

volumes:
  postgres_data: