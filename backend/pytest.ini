[pytest]
# Pytest 配置檔案

# python 路徑
pythonpath = src

# 測試路徑
testpaths = tests

# Python 檔案模式
python_files = test_*.py

# Python 類別模式
python_classes = Test*

# Python 函式模式
python_functions = test_*

# 輸出選項
addopts =
    -v
    --strict-markers
    --tb=short
    --disable-warnings

# 標記定義
markers =
    unit: Unit tests (fast, isolated)
    integration: Integration tests (slower, database required)
    asyncio: Async tests

# 異步測試配置
asyncio_mode = auto

# 最小 Python 版本
minversion = 7.0

