openapi: 3.0.0
info:
  title: Admin Portal API
  version: 1.0.0
  description: 後台管理入口相關 API（主要依賴現有 Auth 資訊）

paths:
  /api/v1/auth/me:
    get:
      summary: 取得當前使用者資訊（含 role）
      responses:
        200:
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'

components:
  schemas:
    User:
      type: object
      properties:
        id:
          type: string
          format: uuid
        username:
          type: string
        email:
          type: string
        role:
          type: string
          enum: [user, admin]
