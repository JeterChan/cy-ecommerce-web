openapi: 3.0.3
info:
  title: Order Management API
  version: 1.0.0
  description: API for transactional checkout and personal order management.
paths:
  /api/v1/orders/checkout:
    post:
      summary: Perform transactional checkout from current Redis cart.
      tags: [Orders]
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [recipient_name, recipient_phone, shipping_address, payment_method]
              properties:
                recipient_name:
                  type: string
                recipient_phone:
                  type: string
                shipping_address:
                  type: string
                payment_method:
                  type: string
                  enum: [COD]
      responses:
        '201':
          description: Order created successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderResponse'
        '400':
          description: Stock insufficient or price changed.
        '404':
          description: Cart is empty.

  /api/v1/orders:
    get:
      summary: List authenticated user's orders.
      tags: [Orders]
      security:
        - BearerAuth: []
      responses:
        '200':
          description: A list of orders.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/OrderListItem'

  /api/v1/orders/{order_id}:
    get:
      summary: Get full order details.
      tags: [Orders]
      security:
        - BearerAuth: []
      parameters:
        - name: order_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Detailed order information.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderResponse'
        '404':
          description: Order not found.

components:
  schemas:
    OrderResponse:
      type: object
      properties:
        id: { type: string, format: uuid }
        status: { type: string, enum: [PROCESSING, SHIPPED, COMPLETED, CANCELLED] }
        total_amount: { type: number, format: float }
        recipient_name: { type: string }
        recipient_phone: { type: string }
        shipping_address: { type: string }
        payment_method: { type: string }
        created_at: { type: string, format: date-time }
        items:
          type: array
          items:
            $ref: '#/components/schemas/OrderItemResponse'

    OrderItemResponse:
      type: object
      properties:
        product_id: { type: string, format: uuid }
        product_name: { type: string }
        price: { type: number, format: float }
        quantity: { type: integer }

    OrderListItem:
      type: object
      properties:
        id: { type: string, format: uuid }
        status: { type: string }
        total_amount: { type: number }
        created_at: { type: string, format: date-time }

  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
