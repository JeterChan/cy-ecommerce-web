openapi: 3.0.3
info:
  title: 使用者個人檔案 API
  version: 1.0.0
  description: 用於管理使用者個人檔案的 API，包含更新、變更電子郵件以及刪除帳戶。
paths:
  /api/v1/auth/me/profile:
    get:
      summary: 取得當前使用者個人檔案
      security:
        - bearerAuth: []
      responses:
        '200':
          description: 成功回應
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserProfileResponse'
        '401':
          description: 未授權
    patch:
      summary: 更新當前使用者個人檔案
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateProfileRequest'
      responses:
        '200':
          description: 個人檔案更新成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserProfileResponse'
        '400':
          description: 驗證錯誤
        '401':
          description: 未授權
        '422':
          description: 處理實體錯誤 (Unprocessable Entity)

  /api/v1/auth/me:
    delete:
      summary: 刪除（停用）當前使用者帳戶
      description: 軟刪除使用者帳戶。30 天後進行硬刪除。
      security:
        - bearerAuth: []
      responses:
        '204':
          description: 帳戶停用成功
        '401':
          description: 未授權

  /api/v1/auth/me/email/change:
    post:
      summary: 請求變更電子郵件
      description: 啟動電子郵件變更流程。發送驗證電子郵件至新舊地址。
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EmailChangeRequest'
      responses:
        '202':
          description: 已發送驗證電子郵件
        '400':
          description: 無效的電子郵件或密碼
        '401':
          description: 未授權

  /api/v1/auth/me/email/verify:
    get:
      summary: 驗證電子郵件變更權杖
      description: 驗證發送至舊或新電子郵件的權杖。
      parameters:
        - name: token
          in: query
          required: true
          schema:
            type: string
        - name: type
          in: query
          required: true
          schema:
            type: string
            enum: [OLD_EMAIL, NEW_EMAIL]
      responses:
        '200':
          description: 權杖驗證成功。如果兩者都驗證通過，則更新電子郵件。
        '400':
          description: 無效或過期的權杖

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    UserProfileResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        username:
          type: string
        email:
          type: string
          format: email
        display_name:
          type: string
          nullable: true
        phone_number:
          type: string
          nullable: true
        avatar_url:
          type: string
          nullable: true
        bio:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
      required:
        - id
        - username
        - email
        - created_at
        - updated_at

    UpdateProfileRequest:
      type: object
      properties:
        display_name:
          type: string
          maxLength: 100
        phone_number:
          type: string
          maxLength: 20
        address:
          type: string
        avatar_url:
          type: string
          maxLength: 500
        bio:
          type: string
          maxLength: 500

    EmailChangeRequest:
      type: object
      properties:
        new_email:
          type: string
          format: email
        password:
          type: string
      required:
        - new_email
        - password