openapi: 3.1.0
info:
  title: User Authentication API
  version: 1.0.0
  description: API for user registration, authentication, and profile management.
paths:
  /api/v1/auth/register:
    post:
      summary: Register a new user
      operationId: register_user
      tags:
        - Auth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserCreate'
      responses:
        '201':
          description: User created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserRead'
        '400':
          description: Bad Request (e.g., email already exists)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPError'

  /api/v1/auth/login:
    post:
      summary: Login to get access token
      operationId: login_for_access_token
      tags:
        - Auth
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                username:
                  type: string
                  format: email
                  description: User email
                password:
                  type: string
                  format: password
                scope:
                  type: string
                  default: ""
                client_id:
                  type: string
                client_secret:
                  type: string
                  # Custom extension for "Remember Me"
                remember_me:
                  type: boolean
                  default: false
                  description: If true, returns a long-lived refresh token
              required:
                - username
                - password
      responses:
        '200':
          description: Successful login
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Token'
        '401':
          description: Incorrect username or password

  /api/v1/auth/refresh:
    post:
      summary: Refresh access token
      operationId: refresh_token
      tags:
        - Auth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                refresh_token:
                  type: string
              required:
                - refresh_token
      responses:
        '200':
          description: New access token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Token'
        '401':
          description: Invalid refresh token

  /api/v1/users/me:
    get:
      summary: Get current logged in user
      operationId: read_users_me
      tags:
        - Users
      security:
        - OAuth2PasswordBearer: []
      responses:
        '200':
          description: User profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserRead'
        '401':
          description: Not authenticated

components:
  securitySchemes:
    OAuth2PasswordBearer:
      type: oauth2
      flows:
        password:
          tokenUrl: /api/v1/auth/login

  schemas:
    UserCreate:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8

    UserRead:
      type: object
      required:
        - id
        - email
        - is_active
        - created_at
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        is_active:
          type: boolean
        is_superuser:
          type: boolean
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    Token:
      type: object
      required:
        - access_token
        - token_type
      properties:
        access_token:
          type: string
        token_type:
          type: string
        refresh_token:
          type: string

    HTTPError:
      type: object
      properties:
        detail:
          type: string
