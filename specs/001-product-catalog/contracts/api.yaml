openapi: 3.0.0
info:
  title: Product Catalog API
  description: API for browsing and searching products.
  version: 1.0.0
paths:
  /products:
    get:
      summary: List products with pagination, search, and filtering
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 10
        - name: q
          in: query
          description: Search query for name/description
          schema:
            type: string
        - name: tag
          in: query
          description: Filter by tag name
          schema:
            type: string
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  products:
                    type: array
                    items:
                      $ref: '#/components/schemas/Product'
                  total:
                    type: integer
                  page:
                    type: integer
                  limit:
                    type: integer

  /products/{id}:
    get:
      summary: Get product details
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Product details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Product'
        '404':
          description: Product not found

  /tags:
    get:
      summary: List all available tags
      responses:
        '200':
          description: List of tags
          content:
            application/json:
              schema:
                type: array
                items:
                  type: string

components:
  schemas:
    Product:
      type: object
      required:
        - id
        - name
        - description
        - price
        - imageUrl
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: string
        price:
          type: number
        imageUrl:
          type: string
        tags:
          type: array
          items:
            type: string
