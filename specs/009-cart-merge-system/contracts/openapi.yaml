openapi: 3.0.3
info:
  title: Cart Service API
  version: 1.0.0
  description: API for managing shopping carts (Guest & Member) and merging logic.

paths:
  /api/v1/cart:
    get:
      summary: Get current cart
      description: Retrieves the cart for the current session (Guest or Member).
      operationId: get_cart
      responses:
        '200':
          description: Current cart contents
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CartResponse'
    delete:
      summary: Clear cart
      description: Removes all items from the current cart.
      operationId: clear_cart
      responses:
        '204':
          description: Cart cleared successfully

  /api/v1/cart/items:
    post:
      summary: Add item to cart
      description: Adds a product to the cart or increments quantity if exists.
      operationId: add_cart_item
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CartItemRequest'
      responses:
        '200':
          description: Item added successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CartResponse'

  /api/v1/cart/items/{product_id}:
    put:
      summary: Update item quantity
      operationId: update_cart_item
      parameters:
        - name: product_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateItemRequest'
      responses:
        '200':
          description: Cart updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CartResponse'
    delete:
      summary: Remove item from cart
      operationId: remove_cart_item
      parameters:
        - name: product_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Item removed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CartResponse'

components:
  schemas:
    CartItemRequest:
      type: object
      required:
        - product_id
        - quantity
      properties:
        product_id:
          type: string
          format: uuid
        quantity:
          type: integer
          minimum: 1
    
    UpdateItemRequest:
      type: object
      required:
        - quantity
      properties:
        quantity:
          type: integer
          minimum: 1

    CartResponse:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/CartItemResponse'
        total_price:
          type: number
          format: float
        total_items:
          type: integer

    CartItemResponse:
      type: object
      properties:
        product_id:
          type: string
          format: uuid
        product_name:
          type: string
        price:
          type: number
        quantity:
          type: integer
        subtotal:
          type: number
